version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test_arch_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      PHP_IDE_CONFIG: serverName=test_arch
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: test_arch
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  npm:
    image: node:20-alpine
    container_name: test_arch-npm
    working_dir: /var/www/html
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    environment:
      NODE_ENV: development
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: test_arch-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_arch_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:

